# Development override for docker-compose.yml
# Run with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.8'

services:
  # Override smrti-app for development
  smrti-app:
    build:
      target: development
    volumes:
      # Mount source code for live reloading
      - .:/app
      - /app/.venv  # Exclude venv from mount
      - /app/__pycache__  # Exclude pycache
    environment:
      - SMRTI_LOG_LEVEL=debug
      - PYTHONPATH=/app
      # Enable development features
      - SMRTI_FEATURE_DEV_MODE=true
      - SMRTI_FEATURE_AUTO_RELOAD=true
    command: ["python", "-m", "uvicorn", "smrti.api.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    
  # Enable all development tools
  redis-commander:
    profiles: []  # Always start in dev mode
    
  pgadmin:
    profiles: []  # Always start in dev mode

  # Jupyter notebook for development and experimentation
  jupyter:
    build:
      context: .
      target: development
    container_name: smrti-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=smrti_dev_token
    volumes:
      - .:/app
      - jupyter-data:/home/smrti/.jupyter
    working_dir: /app
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root"]
    networks:
      - smrti-network
    depends_on:
      - redis
      - postgres
      - neo4j
      - chroma

  # Additional monitoring tools for development
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: smrti-redis-insight
    ports:
      - "8001:8001"
    volumes:
      - redis-insight-data:/db
    networks:
      - smrti-network
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  jupyter-data:
  redis-insight-data: