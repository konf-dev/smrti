name: CI

on:
  push:
    branches: [ main, develop, arch-* ]
  pull_request:
    branches: [ main, develop ]

env:
  POETRY_VERSION: "1.7.1"
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
          
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smrti_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password 'RETURN 1'"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
        ports:
          - 7474:7474
          - 7687:7687
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Download spaCy model
      run: |
        python -m spacy download en_core_web_sm
        
    - name: Lint with ruff
      run: |
        ruff check smrti tests
        
    - name: Check types with mypy
      run: |
        mypy smrti
        
    - name: Check formatting with black
      run: |
        black --check smrti tests
        
    - name: Check import sorting
      run: |
        isort --check-only smrti tests
        
    - name: Security scan with bandit
      run: |
        bandit -r smrti
        
    - name: Run unit tests
      run: |
        pytest -v tests/unit --cov=smrti --cov-report=xml
      env:
        REDIS_URL: redis://localhost:6379
        POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/smrti_test
        NEO4J_URL: bolt://localhost:7687
        NEO4J_AUTH: neo4j/password
        
    - name: Run integration tests
      run: |
        pytest -v tests/integration
      env:
        REDIS_URL: redis://localhost:6379
        POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/smrti_test
        NEO4J_URL: bolt://localhost:7687
        NEO4J_AUTH: neo4j/password
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  adapter-certification:
    runs-on: ubuntu-latest
    needs: test
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smrti_test
        ports:
          - 5432:5432
      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7687:7687
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        python -m spacy download en_core_web_sm
        
    - name: Run adapter certification tests
      run: |
        pytest -v tests/adapters --timeout=300
      env:
        REDIS_URL: redis://localhost:6379
        POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/smrti_test
        NEO4J_URL: bolt://localhost:7687
        NEO4J_AUTH: neo4j/password

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        python -m spacy download en_core_web_sm
        
    - name: Run performance benchmarks
      run: |
        pytest tests/benchmarks --benchmark-only --benchmark-json=benchmark.json
      env:
        REDIS_URL: redis://localhost:6379
        
    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        comment-on-alert: true
        alert-threshold: '150%'
        fail-on-alert: true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'