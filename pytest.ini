# pytest configuration file
[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=smrti
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --asyncio-mode=auto
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests that take significant time
    redis: Tests requiring Redis
    chroma: Tests requiring ChromaDB
    postgres: Tests requiring PostgreSQL
    neo4j: Tests requiring Neo4j
    elasticsearch: Tests requiring Elasticsearch
    embedding: Tests requiring embedding providers
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning