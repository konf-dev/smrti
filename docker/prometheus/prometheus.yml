# Prometheus Configuration for Smrti Memory System
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'smrti-dev'
    replica: 'prometheus-1'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "alert_rules.yml"

# Scrape configuration
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Smrti application metrics
  - job_name: 'smrti-app'
    static_configs:
      - targets: ['smrti-app:9090']
    scrape_interval: 10s
    metrics_path: '/metrics'
    
  # Redis metrics (if redis_exporter is used)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 15s
    
  # PostgreSQL metrics (if postgres_exporter is used)  
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 15s
    
  # Neo4j metrics (built-in metrics endpoint)
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']
    scrape_interval: 15s
    metrics_path: '/metrics'
    
  # ChromaDB metrics (if available)
  - job_name: 'chromadb'
    static_configs:
      - targets: ['chroma:8000']
    scrape_interval: 15s
    metrics_path: '/api/v1/metrics'

  # Node exporter for system metrics (optional)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

