version: '3.8'

services:
  # ==============================================================================
  # SMRTI CORE APPLICATION
  # ==============================================================================
  
  smrti-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smrti-app
    ports:
      - "8000:8000"  # Main API
      - "9090:9090"  # Metrics endpoint
    environment:
      # Smrti Configuration
      SMRTI_LOG_LEVEL: info
      SMRTI_FEATURE_ENABLE_RERANK: "true"
      SMRTI_CONTEXT_DEFAULT_BUDGET: 8000
      
      # Storage Backends
      SMRTI_TIER_WORKING_BACKEND: redis
      SMRTI_TIER_SHORT_TERM_BACKEND: redis
      SMRTI_TIER_LONG_TERM_BACKEND: chroma
      SMRTI_TIER_EPISODIC_BACKEND: postgres
      SMRTI_TIER_SEMANTIC_BACKEND: neo4j
      
      # Database Connections
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://smrti:smrti_password@postgres:5432/smrti
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: smrti_password
      
      # Vector Storage
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_PERSIST_DIRECTORY: /data/chroma
      
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:14268/api/traces
      PROMETHEUS_ENDPOINT: http://prometheus:9090
      
    volumes:
      - ./data/chroma:/data/chroma
      - ./logs:/app/logs
    depends_on:
      - redis
      - postgres
      - neo4j
      - chroma
      - prometheus
      - jaeger
    networks:
      - smrti-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==============================================================================
  # MEMORY TIER STORAGE BACKENDS
  # ==============================================================================

  # Redis - Working Memory & Short-term Memory
  redis:
    image: redis:7.2-alpine
    container_name: smrti-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - smrti-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ChromaDB - Vector Storage for Long-term Memory
  chroma:
    image: chromadb/chroma:latest
    container_name: smrti-chroma
    ports:
      - "8001:8000"  # Expose on different port to avoid conflicts
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: false
      ALLOW_RESET: true
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - smrti-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8000' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL - Episodic Memory
  postgres:
    image: postgres:16-alpine
    container_name: smrti-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smrti
      POSTGRES_USER: smrti
      POSTGRES_PASSWORD: smrti_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - smrti-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smrti -d smrti"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j - Knowledge Graph for Semantic Memory
  neo4j:
    image: neo4j:5.13.0
    container_name: smrti-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/smrti_password
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_apoc_export_file_enabled: true
      NEO4J_apoc_import_file_enabled: true
      NEO4J_apoc_import_file_use__neo4j__config: true
      NEO4JLABS_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins
    networks:
      - smrti-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/7687' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==============================================================================
  # OBSERVABILITY STACK
  # ==============================================================================

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: smrti-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - smrti-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: smrti-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: smrti_password
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - smrti-network
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: smrti-jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # UI
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      SPAN_STORAGE_TYPE: memory
    networks:
      - smrti-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:16686/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==============================================================================
  # DEVELOPMENT & TESTING TOOLS
  # ==============================================================================

  # Redis Commander - Redis GUI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: smrti-redis-gui
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - smrti-network
    depends_on:
      - redis
    restart: unless-stopped
    profiles: ["dev", "tools"]

  # pgAdmin - PostgreSQL GUI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smrti-pgadmin
    ports:
      - "8082:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smrti.dev
      PGADMIN_DEFAULT_PASSWORD: smrti_password
      PGADMIN_DISABLE_POSTFIX: true
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
    networks:
      - smrti-network
    depends_on:
      - postgres
    restart: unless-stopped
    profiles: ["dev", "tools"]

# ==============================================================================
# NETWORKS & VOLUMES
# ==============================================================================

networks:
  smrti-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  # Storage volumes
  redis-data:
  chroma-data:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  neo4j-conf:
  neo4j-import:
  neo4j-plugins:
  
  # Observability volumes  
  prometheus-data:
  grafana-data:
  jaeger-data:
  
  # Development tool volumes
  pgadmin-data: