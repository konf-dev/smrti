services:
  # Redis - Optional bundled service (use only with profile 'bundled')
  redis:
    image: redis:7-alpine
    container_name: smrti-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smrti-network
    restart: unless-stopped
    profiles:
      - bundled

  # Qdrant - Optional bundled service (use only with profile 'bundled')
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: smrti-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - smrti-network
    restart: unless-stopped
    profiles:
      - bundled

  # PostgreSQL - Optional bundled service (use only with profile 'bundled')
  postgres:
    image: postgres:15-alpine
    container_name: smrti-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=smrti
      - POSTGRES_PASSWORD=smrti
      - POSTGRES_DB=smrti
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/smrti/storage/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smrti -d smrti"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smrti-network
    restart: unless-stopped
    profiles:
      - bundled

  # Smrti API - FastAPI application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smrti-api
    ports:
      - "8000:8000"
    env_file:
      - /home/bert/code/ideas-and-docs/.env
    environment:
      # Server
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=4
      - LOG_LEVEL=INFO
      
      # API
      - API_VERSION=2.0.0
      - API_KEYS=${API_KEYS:-dev-key-123,test-key-456}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      
  # Redis (taken from SMRTI_REDIS_URL via .env)
      
      # Qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION_PREFIX=smrti_
      - QDRANT_VECTOR_SIZE=384
      
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=konf_smrti
      - POSTGRES_USER=konf
      - POSTGRES_MIN_POOL_SIZE=5
      - POSTGRES_MAX_POOL_SIZE=20
      
      # Embedding
      - EMBEDDING_PROVIDER=local
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - EMBEDDING_CACHE_SIZE=10000
      - EMBEDDING_BATCH_SIZE=32
      
      # Validation
      - MAX_TEXT_LENGTH=50000
      - MAX_METADATA_SIZE=10240
    volumes:
      - ./src:/app/src:ro
      - embedding_cache:/app/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - smrti-network
      - konf-network
    restart: unless-stopped

  # Prometheus - Metrics collection (optional)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: smrti-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - smrti-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana - Metrics visualization (optional)
  grafana:
    image: grafana/grafana:10.2.2
    container_name: smrti-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - smrti-network
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  smrti-network:
    name: smrti-network
    driver: bridge

  konf-network:
    external: true
    name: konf-dev-infra-network

volumes:
  redis_data:
    name: smrti-redis-data
  qdrant_data:
    name: smrti-qdrant-data
  postgres_data:
    name: smrti-postgres-data
  embedding_cache:
    name: smrti-embedding-cache
  prometheus_data:
    name: smrti-prometheus-data
  grafana_data:
    name: smrti-grafana-data
